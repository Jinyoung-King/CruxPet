<h2>캐릭터 스타일 선택</h2>
<p class="subtitle">도트 애니메이션으로 구현할 캐릭터 방향 — 레벨업마다 진화해요</p>

<style>

.pixel-wrap .lv { font-size: 10px; color: #888; margin-top: 4px; }

.slime-3 { display: inline-grid; grid-template-columns: repeat(10,5px); gap:1px; }

.bird-2 { display: inline-grid; grid-template-columns: repeat(8,5px); gap:1px; }

/* ── 고양이 캐릭터 ── */

.cat-2 { display: inline-grid; grid-template-columns: repeat(8,5px); gap:1px; }
.cat-3 { display: inline-grid; grid-template-columns: repeat(10,5px); gap:1px; }

.t { background: transparent; }
.a { background: #7EC8E3; } /* 슬라임 메인 */
.b { background: #5BA3C9; } /* 슬라임 어두운 */
.e { background: #fff; }    /* 눈 흰자 */
.f { background: #222; }    /* 눈동자 */
.g { background: #FFD166; } /* 새 몸 */
.h { background: #F4A261; } /* 새 어두운 */

.j { background: #F5A5B0; } /* 고양이 */
.k { background: #E07B8E; } /* 고양이 어두운 */
.l { background: #FFB3C1; } /* 고양이 밝은 */

@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
.anim-bob { animation: bob 1s ease-in-out infinite; }
.anim-blink .eye { animation: blink 3s ease-in-out infinite; }
