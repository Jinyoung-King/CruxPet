name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Clean SPM cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Build Release
        run: |
          xcodebuild archive \
            -scheme CruxPet \
            -configuration Release \
            -archivePath /tmp/CruxPet.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp=none" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=${{ env.VERSION }}

      - name: Export App
        run: |
          cp -R /tmp/CruxPet.xcarchive/Products/Applications/CruxPet.app /tmp/CruxPet.app

      - name: Create DMG
        run: |
          mkdir /tmp/dmg-contents
          cp -R /tmp/CruxPet.app /tmp/dmg-contents/
          ln -s /Applications /tmp/dmg-contents/Applications
          hdiutil create \
            -volname "CruxPet ${{ env.VERSION }}" \
            -srcfolder /tmp/dmg-contents \
            -ov -format UDZO \
            /tmp/CruxPet-${{ env.VERSION }}.dmg

      - name: Sign update for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -path "*/artifacts/sparkle/Sparkle/bin/sign_update" 2>/dev/null | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -not -type d 2>/dev/null | head -1)
          fi
          if [ -z "$SIGN_UPDATE" ]; then
            curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.2/Sparkle-2.9.2.tar.xz | tar -xJ -C /tmp
            SIGN_UPDATE="/tmp/bin/sign_update"
          fi
          SPARKLE_RAW=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" /tmp/CruxPet-${{ env.VERSION }}.dmg --ed-key-file -)
          SPARKLE_SIGNATURE=$(echo "$SPARKLE_RAW" | sed 's/.*edSignature="\([^"]*\)".*/\1/')
          echo "SPARKLE_SIGNATURE=$SPARKLE_SIGNATURE" >> $GITHUB_ENV
          echo "DMG_LENGTH=$(stat -f%z /tmp/CruxPet-${{ env.VERSION }}.dmg)" >> $GITHUB_ENV

      - name: Update appcast.xml
        run: |
          PUBDATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>CruxPet</title>
              <item>
                <title>Version ${{ env.VERSION }}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:version>${{ github.run_number }}</sparkle:version>
                <sparkle:shortVersionString>${{ env.VERSION }}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/Jinyoung-King/CruxPet/releases/download/${{ github.ref_name }}/CruxPet-${{ env.VERSION }}.dmg"
                  length="${{ env.DMG_LENGTH }}"
                  type="application/octet-stream"
                  sparkle:edSignature="${{ env.SPARKLE_SIGNATURE }}"
                />
              </item>
            </channel>
          </rss>
          EOF

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/CruxPet-${{ env.VERSION }}.dmg
          generate_release_notes: true
